<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hydra Verificação</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a0000, #300000);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #0b1220;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
    }

    .code-box {
      display: flex;
      margin: 15px 0;
      gap: 8px;
    }

    .code-box input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      text-align: center;
      font-weight: bold;
    }

    .code-box button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
    }

    .code-box button:hover {
      background: #4752c4;
    }

    .btn {
      display: block;
      margin-top: 15px;
      padding: 12px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #4752c4;
    }

    .instrucoes {
      font-size: 13px;
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🔐 Verificação Discord</h2>

    <p>
      Copie o código abaixo e finalize sua verificação no Discord.
    </p>

    <div class="code-box">
      <input type="text" id="codigo" value="CARREGANDO..." readonly>
      <button onclick="copiarCodigo()">Copiar</button>
    </div>

    <p class="instrucoes">
      Após copiar, vá até o Discord e clique em <b>"Adicionar Código"</b>.
      Só vai funcionar com o código enviado pelo bot.
    </p>

    <a href="https://discord.com" class="btn">Voltar ao Discord</a>
  </div>

  <script>
    // pega código da URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    const campo = document.getElementById("codigo");

    if (code) {
      campo.value = code;
    } else {
      campo.value = "SEM-CODIGO";
    }

    function copiarCodigo() {
      const input = document.getElementById("codigo");
      input.select();
      input.setSelectionRange(0, 99999);

      navigator.clipboard.writeText(input.value);

      alert("Código copiado!");
    }
  </script>

</body>
</html>
