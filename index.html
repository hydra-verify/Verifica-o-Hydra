<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra Verification</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: #111827;
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

/* TÍTULO */
.title {
    font-size: 26px;
    color: #00ffff;
    margin-bottom: 10px;
}

/* SUB */
.sub {
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 20px;
}

/* STATUS */
.status {
    color: #22c55e;
    font-size: 14px;
    margin-bottom: 30px;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #00ffff;
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00cccc;
}

/* INPUT (ESCONDIDO) */
.input-area {
    display: none;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

/* SUCESSO */
.success {
    display: none;
    margin-top: 20px;
    color: #22c55e;
}
</style>

</head>

<body>

<div class="card">

    <div class="title">Hydra</div>
    <div class="sub">Conta conectada com sucesso!</div>

    <div class="status">● Verificação disponível</div>

    <button onclick="abrirInput()">Verificar</button>

    <div class="input-area" id="area">
        <input type="text" id="codigo" placeholder="Digite seu código">
        <button onclick="verificarCodigo()">Confirmar Código</button>
    </div>

    <div class="success" id="ok">
        ✅ Verificação concluída!<br>
        Pode voltar ao Discord.
    </div>

</div>

<script>
function abrirInput() {
    document.getElementById("area").style.display = "block";
}

function verificarCodigo() {
    let codigo = document.getElementById("codigo").value;

    if (codigo.length < 4) {
        alert("Código inválido");
        return;
    }

    document.getElementById("ok").style.display = "block";
}
</script>

</body>
</html>
